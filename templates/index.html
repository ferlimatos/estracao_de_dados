<!DOCTYPE html>
<html>
<head>
    <title>Cursos</title>
</head>
<body>

<h1>Cursos</h1>

<!-- Filtros de busca -->
<section id="filtros">
    <h2>Encontre seu curso</h2>
    <form id="formBusca">
        <input type="text" id="termo" placeholder="Digite o nome do curso...">

        <select id="unidade">
            <option value="">Todas as Unidades</option>
            <!-- Você pode preencher estes valores manualmente ou via JS -->
            <option value="José Luiz Bittencourt">José Luiz Bittencourt</option>
            <option value="Luiz Rassi">Luiz Rassi</option>
            <option value="Artes Basileu França">Artes Basileu França</option>
        </select>

        <button type="submit">Buscar</button>
    </form>
</section>
<!-- A div onde os dados dos cursos serão exibidos -->
<div id="dados"></div>

<script>
// Carrega os dados dos cursos e exibe na página
fetch("/api/cursos")
  .then(res => res.json())
  .then(data => {
    const div = document.getElementById("dados");
    let htmlFinal = ""; // Variável para acumular o HTML

    data.forEach(c => {
        const botoesHtml = Object.entries(c.botoes || {})
            .map(([texto, link]) => `<a href="${link}" class="btn">${texto}</a>`)
            .join(" ");

        htmlFinal += `
            <div class="curso-card">
                <h3>${c.nome}</h3>
                <p><strong>Unidade:</strong> ${c.unidade}</p>
                <p><strong>Status:</strong> ${c.status}</p>
                <div class="botoes">${botoesHtml}</div>
            </div>
            <hr>
        `;
    });

    div.innerHTML = htmlFinal; // Atualiza a tela uma única vez
  });
</script>

</body>
</html>
